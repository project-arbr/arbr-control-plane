name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include API keys,
        `.env` values, or other secrets in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, request body, or code to reproduce the behavior.
      placeholder: |
        1. Send POST /v1/chat/completions with ...
        2. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or git commit you are running.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gateway (/v1/chat, OpenAI-compat)
        - Routing / policy
        - Dashboard (web)
        - SDK (JS or Python)
        - Deployment / config
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs or error output (secrets removed).
      render: shell
